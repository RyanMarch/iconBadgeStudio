<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Badge Studio</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Icon Studio" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />

    <!-- External Assets -->
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">

    <div class="screenshot-toolbar">
        <div class="toolbar-main">
            <button class="toolbar-btn secondary" onclick="toggleScreenshotMode()">
                <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Return
            </button>
            <button class="toolbar-btn primary" onclick="exportPNG()">
                <i data-lucide="download" style="width:16px;height:16px"></i> Export
            </button>
        </div>
        <div class="toolbar-sub">
            <div class="toolbar-group">
                <input type="checkbox" id="shadow-toggle-sc" checked onchange="toggleShadows(this.checked)" style="width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;">
                <label for="shadow-toggle-sc">Show Shadows</label>
            </div>
        </div>
    </div>

    <div class="container" id="tool-container">
        <!-- Preview -->
        <div class="preview-section">
            <div class="preview-header">
                <h1>Icon Badge Studio</h1>
                <div class="header-actions">
                    <div style="display: flex; flex-direction: column; gap: 0.4rem; align-items: flex-end;">
                        <div style="display: flex; gap: 0.5rem; width: 100%; align-items: stretch;">
                            <button id="remove-base-icon" class="danger" style="width: 40px; display: none; padding: 0; justify-content: center;" onclick="resetBaseIcon()" title="Remove uploaded image">
                                <i data-lucide="trash-2" style="width:16px;height:16px"></i>
                            </button>
                            <button class="secondary" style="padding: 0.5rem 0.75rem; flex: 1; white-space: nowrap;" onclick="document.getElementById('base-icon-upload').click()">
                                <i data-lucide="upload" style="width:16px;height:16px"></i> Upload Base Image
                            </button>
                        </div>
                        <div class="base-bg-control" style="display: flex; align-items: center; gap: 0.5rem;">
                            <label for="base-bg-color" style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.02em; cursor: pointer;">Base background color</label>
                            <div class="base-color-picker" title="Base Background Color">
                                <input type="color" id="base-bg-color" value="#ffffff" oninput="setBaseColor(this.value)">
                            </div>
                        </div>
                    </div>
                    <input type="file" id="base-icon-upload" accept="image/*" style="display: none" onchange="handleBaseIconUpload(event)">
                </div>
            </div>

            <div class="icon-canvas-wrapper" id="capture-area">
                <div class="icon-canvas pos-bottom-right" id="icon-canvas">
                    <div class="base-bg squircle" id="base-bg"></div>
                    <img src="assets/img/base-placeholder.svg" alt="Placeholder Icon" class="base-icon" id="base-img">
                    <div class="badge-container pos-bottom-right" id="badge-wrap">
                        <div class="badge-shape circle" id="badge-shape"></div>
                        <div class="badge-icon" id="badge-icon-target">
                            <i data-lucide="users"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-actions">
                <button class="primary" onclick="exportPNG()">
                    <i data-lucide="download" style="width:18px;height:18px"></i> Export PNG
                </button>
                <button id="copy-url-btn" class="secondary" style="display: none;" onclick="copyURL()">
                    <i data-lucide="copy" style="width:18px;height:18px"></i> Copy URL
                </button>
                <button class="secondary" onclick="toggleScreenshotMode()">
                    <i data-lucide="maximize" style="width:18px;height:18px"></i> Screenshot Mode
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            
            <div class="compact-row">
                <div class="control-group">
                    <label>Base Shape</label>
                    <div class="shape-grid-2x2">
                        <button class="shape-btn shape-btn-sm" data-base-shape="square" onclick="setBaseShape('square')">Square</button>
                        <button class="shape-btn shape-btn-sm active" data-base-shape="squircle" onclick="setBaseShape('squircle')">Squircle</button>
                        <button class="shape-btn shape-btn-sm" data-base-shape="roundrect" onclick="setBaseShape('roundrect')">Round</button>
                        <button class="shape-btn shape-btn-sm" data-base-shape="circle" onclick="setBaseShape('circle')">Circle</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Badge Position</label>
                    <div class="shape-grid-2x2">
                        <button class="shape-btn shape-btn-sm" data-pos="top-left" onclick="setBadgePosition('top-left')">Top L</button>
                        <button class="shape-btn shape-btn-sm" data-pos="top-right" onclick="setBadgePosition('top-right')">Top R</button>
                        <button class="shape-btn shape-btn-sm" data-pos="bottom-left" onclick="setBadgePosition('bottom-left')">Bot L</button>
                        <button class="shape-btn shape-btn-sm active" data-pos="bottom-right" onclick="setBadgePosition('bottom-right')">Bot R</button>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Badge Shape</label>
                <div class="shape-grid-4x2">
                    <button class="shape-btn shape-btn-sm active" data-shape="circle" onclick="setShape('circle')">Circle</button>
                    <button class="shape-btn shape-btn-sm" data-shape="roundrect" onclick="setShape('roundrect')">RoundRect</button>
                    <button class="shape-btn shape-btn-sm" data-shape="squircle" onclick="setShape('squircle')">Squircle</button>
                    <button class="shape-btn shape-btn-sm" data-shape="square-hard" onclick="setShape('square-hard')">Hard Sq</button>
                    <button class="shape-btn shape-btn-sm" data-shape="hexagon" onclick="setShape('hexagon')">Hex V</button>
                    <button class="shape-btn shape-btn-sm" data-shape="hexagon-h" onclick="setShape('hexagon-h')">Hex H</button>
                    <button class="shape-btn shape-btn-sm" data-shape="diamond" onclick="setShape('diamond')">Diamond</button>
                    <button class="shape-btn shape-btn-sm" data-shape="shield" onclick="setShape('shield')">Shield</button>
                </div>
            </div>

            <div class="control-group">
                <label>Badge Color</label>
                <div class="color-presets" id="color-presets">
                    <!-- Dynamic swatches -->
                    <div class="custom-color-wrapper" id="custom-color-ui" title="Custom Color">
                        <i data-lucide="plus" style="width:20px;height:20px;color:white"></i>
                        <input type="color" id="custom-color" value="#3b82f6" oninput="setColor(this.value)">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Icon Picker (<a href="https://lucide.dev/icons" target="_blank" style="color: inherit; text-decoration: underline; text-underline-offset: 2px;">Lucide</a>)</label>
                <div class="icon-picker-wrapper">
                    <input type="text" id="icon-input" name="icon-search" placeholder="e.g. users, gauge, dumbbell, bell..." oninput="handleIconInput(this.value)" onfocus="showSuggestions()" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
                    <div id="icon-dropdown" class="icon-dropdown"></div>
                </div>
                <div class="icon-suggestions">
                    Try: 
                    <span class="suggestion-tag" onclick="setIcon('dumbbell')">dumbbell</span>, 
                    <span class="suggestion-tag" onclick="setIcon('users')">users</span>, 
                    <span class="suggestion-tag" onclick="setIcon('gauge')">gauge</span>, 
                    <span class="suggestion-tag" onclick="setIcon('mail')">mail</span>, 
                    <span class="suggestion-tag" onclick="setIcon('settings')">settings</span>, 
                    <span class="suggestion-tag" onclick="setIcon('search')">search</span>
                </div>
            </div>

            <div class="control-group">
                <div class="range-header">
                    <label>Badge Size</label>
                    <span class="range-val"><span id="badge-size-val">40</span>%</span>
                </div>
                <input type="range" id="badge-size-input" min="20" max="60" value="40" oninput="setBadgeSize(this.value)">
            </div>

            <div class="control-group">
                <div class="range-header">
                    <label>Badge Rotation</label>
                    <span class="range-val"><span id="badge-rot-val">0</span>°</span>
                </div>
                <input type="range" id="badge-rot-input" min="0" max="360" value="0" oninput="setBadgeRotation(this.value)">
            </div>

            <div class="control-group">
                <div class="range-header">
                    <label>Badge Icon Scale</label>
                    <span class="range-val"><span id="inner-scale-val">70</span>%</span>
                </div>
                <input type="range" id="inner-scale-input" min="20" max="100" value="70" oninput="setInnerScale(this.value)">
            </div>

            <div class="control-group">
                <div class="range-header">
                    <label>Base Image Size</label>
                    <span class="range-val"><span id="base-size-val">80</span>%</span>
                </div>
                <input type="range" id="base-size-input" min="50" max="100" value="80" oninput="setBaseSize(this.value)">
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="shadow-toggle" checked onchange="toggleShadows(this.checked)" style="width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;">
                    <label for="shadow-toggle" style="margin: 0; cursor: pointer; text-transform: none; font-size: 0.75rem; color: var(--text-muted);">Show Shadows</label>
                </div>
                <button class="secondary" style="padding: 0.5rem 0.75rem; font-size: 0.75rem;" onclick="resetDefaults()">
                    <i data-lucide="refresh-cw" style="width:14px;height:14px"></i> Reset All
                </button>
            </div>
        </div>
    </div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
